<title>Bloom Healthcare Group</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   RESET & BASE
============================================================ */
:root {
    --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    /* Centers the background image perfectly on mobile screens */
    --mobile-center-target: -81%; 
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: #0a0a0a;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
}

/* ============================================================
   PAGE HEADER
============================================================ */
.page-header {
    width: 100%;
    text-align: center;
    padding: 2.5rem 1rem 1.5rem;
    z-index: 10;
    position: relative;
}
.page-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 4vw, 2.4rem);
    font-weight: 600;
    letter-spacing: -0.01em;
    color: #fff;
}
.page-header p {
    font-size: 11px;
    color: #999;
    margin-bottom: 5px;
    letter-spacing: 2px;
    text-transform: uppercase;
}

/* ============================================================
   SCENE CONTAINER (BACKGROUND IMAGE)
============================================================ */
.scene-wrapper {
    position: relative;
    width: 100%;
    max-width: 1200px; 
    height: calc(100vh - 160px); 
    min-height: 600px; 
    border-radius: 24px;
    box-shadow: 0 40px 100px rgba(0,0,0,0.8);
    overflow: hidden;
    margin: 0 20px 40px;
}

.scene-content {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
}

#building-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center; 
    filter: brightness(0.85) contrast(1.1);
    z-index: 1;
}

/* ============================================================
   SVG LINE LAYER
============================================================ */
#line-svg {
    position: absolute;
    inset: 0;
    width: 100%; 
    height: 100%;
    pointer-events: none;
    z-index: 8;
    overflow: visible; 
}

.connector-line {
    fill: none;
    stroke-width: 2.5;
    stroke-linecap: round;
    filter: drop-shadow(0 0 5px rgba(255,255,255,0.4));
}

/* ============================================================
   ABSOLUTE HOTSPOTS (LOGOS ON BUILDING)
============================================================ */
#hotspots-layer {
    position: absolute;
    inset: 0;
    z-index: 15;
    pointer-events: none; 
}

.hotspot {
    position: absolute;
    transform: translate(-50%, -50%); 
    display: flex;
    align-items: center;
    gap: 15px;
    cursor: pointer;
    pointer-events: auto;
}

.hit-area {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 0;
}

.hover-logo {
    object-fit: contain;
    transition: var(--transition);
    position: relative;
    z-index: 2;
}

.menu-dot {
    width: 14px;
    height: 14px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 0 12px rgba(255,255,255,0.8);
    transform: scale(0);
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    flex-shrink: 0;
    position: relative;
    z-index: 2;
}

.hotspot:hover .hover-logo, .hotspot.active .hover-logo {
    transform: scale(1.15);
    border-color: rgba(255, 255, 255, 0.3);
    filter: drop-shadow(0 8px 15px rgba(0,0,0,0.7));
}

.hotspot:hover .menu-dot, .hotspot.active .menu-dot {
    transform: scale(1);
    opacity: 1;
}

/* ============================================================
   CONTENT CARD
============================================================ */
.content-card {
    position: absolute;
    width: 400px;
    border-radius: 24px;
    padding: 35px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    pointer-events: none;
    opacity: 0;
    visibility: hidden;
    transform: translateX(20px); 
    transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
    box-shadow: 0 40px 80px rgba(0,0,0,0.6);
    /* REMOVED: backdrop-filter: blur(12px); - This allows the transparent background color to work properly! */
    z-index: 20;
}

.content-card.active {
    opacity: 1;
    visibility: visible;
    transform: translateX(0);
    pointer-events: auto;
}

.content-card, .modal-content {
    color: var(--card-text, #fff);
    border: 1px solid var(--card-border, rgba(255,255,255,0.15));
}
.c-desc {
    color: var(--card-desc, rgba(255,255,255,0.9));
}

.close-btn {
    position: absolute;
    top: 20px; right: 20px;
    width: 32px; height: 32px;
    border-radius: 50%;
    font-size: 14px;
    font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    z-index: 10;
    border: none;
}
.close-btn:hover { transform: scale(1.1); }

.c-logo-container {
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--card-border, rgba(255,255,255,0.2));
    width: 100%;
}

.c-desc {
    line-height: 1.5;
    margin-bottom: 25px;
}

/* ============================================================
   GALLERIES (GRID vs SLIDER)
============================================================ */
.gallery-wrapper {
    width: 100%;
    margin-bottom: 25px;
}

/* 3-Image Grid Style */
.card-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    width: 100%;
}
.card-grid img {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    border-radius: 4px;
    background: rgba(0,0,0,0.2); /* Fallback for empty images */
}

/* Slider Style */
.card-slider {
    width: 100%;
    height: 160px;
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    background: rgba(0,0,0,0.1);
    box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
    border: 1px solid var(--card-border, rgba(255,255,255,0.1));
}
.slide {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.8s ease-in-out;
}
.slide.active { opacity: 1; }

.slider-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.4);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
    width: 28px; height: 28px;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    z-index: 5;
    transition: all 0.2s;
}
.slider-btn:hover { background: rgba(0,0,0,0.8); transform: translateY(-50%) scale(1.1); }
.slider-btn.prev { left: 10px; }
.slider-btn.next { right: 10px; }

.slider-pagination {
    position: absolute;
    bottom: 12px;
    left: 0; width: 100%;
    display: flex; justify-content: center; gap: 6px;
    z-index: 5;
}
.slider-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--dot-color, rgba(255,255,255,0.4));
    cursor: pointer;
    transition: all 0.3s;
}
.slider-dot:hover { background: var(--dot-active, rgba(255,255,255,0.8)); }
.slider-dot.active { background: var(--dot-active, #fff); transform: scale(1.3); }

/* ============================================================
   LINKS (UNDERLINE vs PILL BUTTON)
============================================================ */
.c-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    transition: all 0.3s;
}

/* Default Pill Button Style */
.c-link.style-button {
    padding: 14px 32px;
    border-radius: 30px;
    font-weight: 600;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    background: var(--card-btn-bg, #fff);
    color: var(--card-btn-text, #000);
}
.c-link.style-button:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

/* Underlined Text Style */
.c-link.style-underline {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 18px;
    font-weight: 400;
    color: var(--card-text, #fff);
    border-bottom: 1px solid var(--card-text, #fff);
    padding-bottom: 2px;
}
.c-link.style-underline:hover { opacity: 0.7; }

/* ============================================================
   MOBILE MODAL
============================================================ */
.modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7); /* slightly darker overlay to pop the card */
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    transition: all 0.4s ease;
}
.modal-overlay.active { opacity: 1; visibility: visible; }

.modal-content {
    width: 90%;
    max-width: 400px;
    border-radius: 24px;
    padding: 40px 30px 35px;
    text-align: center;
    position: relative;
    transform: translateY(30px) scale(0.95);
    transition: var(--transition);
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    /* REMOVED: backdrop-filter: blur(12px); - Let the transparency shine */
}
.modal-overlay.active .modal-content { transform: translateY(0) scale(1); }

.nav-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    border-radius: 50%;
    width: 36px; height: 36px;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    z-index: 10;
    background: var(--card-border, rgba(0,0,0,0.2));
    border: 1px solid var(--card-border, rgba(255,255,255,0.2));
    color: var(--card-text, #fff);
}
.nav-arrow:hover { background: var(--card-border, rgba(0,0,0,0.4)); }
.nav-arrow.prev { left: 15px; }
.nav-arrow.next { right: 15px; }

/* ============================================================
   RESPONSIVE LOGIC
============================================================ */
@media (max-width: 900px) {
    .scene-wrapper {
        margin: 0 10px 20px;
        width: calc(100% - 20px);
        height: auto; 
        min-height: 600px;
    }
    #line-svg { display: none !important; }
    .content-card { display: none !important; }

    .scene-content {
        width: 280%; 
        left: 50%;
        transform: translateX(var(--mobile-center-target));
    }
}
</style>
</head>

const desktopCard = document.getElementById('desktop-card');
const mobileOverlay = document.getElementById('mobile-overlay');
const modalCard = document.getElementById('modal-card');
const path = document.getElementById('connector-path');
const wrapper = document.getElementById('scene-wrapper');

let isMobile = window.innerWidth <= 900;
let activeIndex = -1;
let slideInterval; 

function init() {
    container.innerHTML = '';
    DATA.forEach((floor, index) => {
        const hs = document.createElement('div');
        hs.className = 'hotspot';
        hs.id = `hotspot-${index}`;
        
        hs.style.top = isMobile && floor.mobilePctTop !== undefined ? `${floor.mobilePctTop}%` : `${floor.pctTop}%`;
        hs.style.left = isMobile && floor.mobilePctLeft !== undefined ? `${floor.mobilePctLeft}%` : `${floor.pctLeft}%`;
        
        const dotHTML = `<div class="menu-dot"></div>`;
        
        hs.innerHTML = `
            <div class="hit-area" style="width: ${floor.hitAreaWidth || '200px'}; height: ${floor.hitAreaHeight || '100px'};"></div>
            ${floor.side === 'left' ? dotHTML : ''}
            <img src="${floor.logoSrc}" class="hover-logo" alt="${floor.name}" onerror="this.style.display='none'" style="width: ${floor.hotspotLogoWidth || '150px'}; height: auto; max-width: none; max-height: none;" />
            ${floor.side === 'right' ? dotHTML : ''}
        `;
        
        hs.addEventListener('mouseenter', () => { if(!isMobile) showDesktop(index); });
        hs.addEventListener('click', () => { if(isMobile) showMobile(index); else showDesktop(index); });
        
        container.appendChild(hs);
    });
}

function applyCardStyles(card, data, prefix) {
    card.style.background = data.bgGradient;
    card.style.setProperty('--card-text', data.textColor);
    card.style.setProperty('--card-desc', data.descColor);
    if(data.btnBg) card.style.setProperty('--card-btn-bg', data.btnBg);
    if(data.btnText) card.style.setProperty('--card-btn-text', data.btnText);
    card.style.setProperty('--card-border', data.borderColor);
    card.style.setProperty('--dot-color', data.dotColor || 'rgba(255,255,255,0.4)');
    card.style.setProperty('--dot-active', data.dotActiveColor || '#ffffff');

    // Apply specific bespoke fonts
    const descEl = document.getElementById(prefix + '-desc');
    descEl.style.fontFamily = data.descFont || "'Plus Jakarta Sans', sans-serif";
    descEl.style.fontSize = data.descFontSize || "14px";

    // Apply close button custom colors
    const closeBtn = document.getElementById(prefix + '-close');
    if (closeBtn) {
        closeBtn.style.background = data.closeBtnBg || "rgba(0,0,0,0.1)";
        closeBtn.style.color = data.closeBtnColor || "#ffffff";
    }
}

function renderGallery(prefix, data) {
    clearInterval(slideInterval);
    const galleryWrapper = document.getElementById(prefix + '-gallery');
    
    if (!data.images || data.images.length === 0) {
        galleryWrapper.innerHTML = '';
        return;
    }

    if (data.galleryType === 'grid') {
        // Render 3-box Grid
        let html = `<div class="card-grid">`;
        data.images.slice(0, 3).forEach(img => {
            html += `<img src="${img}" alt="${data.name} Photo" />`;
        });
        html += `</div>`;
        galleryWrapper.innerHTML = html;
        
    } else {
        // Render Standard Slider
        let html = `<div class="card-slider" id="${prefix}-slider-inner">`;
        html += data.images.map((img, i) => `
            <img src="${img}" class="slide ${i === 0 ? 'active' : ''}" alt="${data.name} Interior" />
        `).join('');
        
        if (data.images.length > 1) {
            html += `
                <button class="slider-btn prev">❮</button>
                <button class="slider-btn next">❯</button>
                <div class="slider-pagination">
                    ${data.images.map((_, i) => `<span class="slider-dot ${i === 0 ? 'active' : ''}"></span>`).join('')}
                </div>
            `;
        }
        html += `</div>`;
        galleryWrapper.innerHTML = html;

        // Slider logic
        if (data.images.length > 1) {
            const slider = document.getElementById(prefix + '-slider-inner');
            const slides = slider.querySelectorAll('.slide');
            const dots = slider.querySelectorAll('.slider-dot');
            const btnPrev = slider.querySelector('.slider-btn.prev');
            const btnNext = slider.querySelector('.slider-btn.next');
            const numSlides = data.images.length;
            let currentSlide = 0;
            
            function goToSlide(n) {
                slides[currentSlide].classList.remove('active');
                dots[currentSlide].classList.remove('active');
                currentSlide = (n + numSlides) % numSlides;
                slides[currentSlide].classList.add('active');
                dots[currentSlide].classList.add('active');
                resetInterval();
            }
            
            btnPrev.addEventListener('click', (e) => { e.preventDefault(); goToSlide(currentSlide - 1); });
            btnNext.addEventListener('click', (e) => { e.preventDefault(); goToSlide(currentSlide + 1); });
            dots.forEach((dot, i) => dot.addEventListener('click', (e) => { e.preventDefault(); goToSlide(i); }));
            
            function resetInterval() {
                clearInterval(slideInterval);
                slideInterval = setInterval(() => { goToSlide(currentSlide + 1); }, 3000);
            }
            resetInterval();
        }
    }
}

function updateContent(prefix, data) {
    const logoImg = document.getElementById(prefix + '-logo');
    logoImg.src = data.cardLogoSrc || data.logoSrc;
    logoImg.style.width = data.cardLogoWidth || '160px';
    logoImg.style.height = 'auto';
    logoImg.style.maxHeight = 'none';
    
    document.getElementById(prefix + '-desc').innerHTML = data.desc; 
    
    // Switch between Underline text link and Pill button link
    const linkEl = document.getElementById(prefix + '-link');
    linkEl.href = data.link;
    if (data.linkType === 'underline') {
        linkEl.className = 'c-link style-underline';
        linkEl.innerHTML = 'Visit Our Website';
    } else {
        linkEl.className = 'c-link style-button';
        linkEl.innerHTML = 'Visit Our Website <span>↗</span>';
    }

    renderGallery(prefix, data);
}

function drawConnectorLine(hotspotEl, cardElement, side) {
    const wRect = wrapper.getBoundingClientRect();
    const dot = hotspotEl.querySelector('.menu-dot');
    const dRect = dot.getBoundingClientRect();
    
    const startX = dRect.left - wRect.left + (dRect.width / 2);
    const startY = dRect.top - wRect.top + (dRect.height / 2);
    
    const targetLeft = parseFloat(cardElement.style.left);
    const targetTop = parseFloat(cardElement.style.top);
    const cardHeight = cardElement.offsetHeight || 400; 
    const cardWidth = 400; 

    let endX;
    if (side === 'left') {
        endX = targetLeft + cardWidth;
    } else {
        endX = targetLeft;
    }
    const endY = targetTop + (cardHeight / 2);
    
    const controlOffset = Math.abs(startX - endX) * 0.4;
    const d = `M ${startX} ${startY} C ${startX - controlOffset} ${startY}, ${endX + controlOffset} ${endY}, ${endX} ${endY}`;
    
    path.setAttribute('d', d);

    const length = path.getTotalLength();
    path.style.transition = 'none'; 
    path.style.strokeDasharray = length + ' ' + length;
    path.style.strokeDashoffset = length;
    path.getBoundingClientRect();
    path.style.transition = 'stroke-dashoffset 0.6s cubic-bezier(0.23, 1, 0.32, 1)';
    path.style.strokeDashoffset = '0';
}

function showDesktop(index) {
    if(activeIndex === index) return;
    activeIndex = index;
    const data = DATA[index];
    
    document.querySelectorAll('.hotspot').forEach(m => m.classList.remove('active'));
    const activeHotspot = document.getElementById(`hotspot-${index}`);
    activeHotspot.classList.add('active');
    
    updateContent('d', data);
    applyCardStyles(desktopCard, data, 'd');
    
    const wRect = wrapper.getBoundingClientRect();
    const hX = wRect.width * (data.pctLeft / 100);
    const hY = wRect.height * (data.pctTop / 100);

    const cardWidth = 400;
    const gap = 140; 
    let cardX, cardY;

    if (data.side === 'left') {
        cardX = hX - cardWidth - gap;
        desktopCard.style.transform = 'translateX(30px)';
    } else {
        cardX = hX + gap;
        desktopCard.style.transform = 'translateX(-30px)';
    }

    if (data.vAlign === 'up') {
        cardY = hY - 300; 
    } else {
        cardY = hY - 100; 
    }

    cardX += (data.cardOffsetX || 0);
    cardY += (data.cardOffsetY || 0);

    desktopCard.style.left = `${cardX}px`;
    desktopCard.style.top = `${cardY}px`;
    
    setTimeout(() => {
        desktopCard.classList.add('active');
        const strokeColor = data.lineColor || (data.textColor === '#1a1a1a' ? 'rgba(0,0,0,0.5)' : 'rgba(255,255,255,0.7)');
        path.setAttribute('stroke', strokeColor);
        drawConnectorLine(activeHotspot, desktopCard, data.side);
    }, 10);
}

function closeDesktopCard() {
    if(activeIndex === -1) return;
    
    desktopCard.classList.remove('active');
    if (path.getTotalLength) {
        const length = path.getTotalLength();
        path.style.transition = 'stroke-dashoffset 0.4s ease-out';
        path.style.strokeDashoffset = length;
    }

    document.querySelectorAll('.hotspot').forEach(m => m.classList.remove('active'));
    clearInterval(slideInterval);
    activeIndex = -1;
}

function showMobile(index) {
    activeIndex = index;
    updateMobileContent();
    mobileOverlay.classList.add('active');
    document.body.style.overflow = 'hidden';
}

function updateMobileContent() {
    if (activeIndex < 0) activeIndex = DATA.length - 1;
    if (activeIndex >= DATA.length) activeIndex = 0;

    const data = DATA[activeIndex];
    updateContent('m', data);
    applyCardStyles(modalCard, data, 'm');
}

function navigateMobile(direction) {
    activeIndex += direction;
    updateMobileContent();
}

function hideModal() {
    mobileOverlay.classList.remove('active');
    document.body.style.overflow = '';
    clearInterval(slideInterval);
}

function closeMobileModal(e) {
    if(e.target === mobileOverlay) hideModal();
}

wrapper.addEventListener('mouseleave', () => {
    if(!isMobile) closeDesktopCard();
});

window.addEventListener('resize', () => {
    const wasMobile = isMobile;
    isMobile = window.innerWidth <= 900;
    
    if (wasMobile !== isMobile) {
        DATA.forEach((floor, index) => {
            const hs = document.getElementById(`hotspot-${index}`);
            if (hs) {
                hs.style.top = isMobile && floor.mobilePctTop !== undefined ? `${floor.mobilePctTop}%` : `${floor.pctTop}%`;
                hs.style.left = isMobile && floor.mobilePctLeft !== undefined ? `${floor.mobilePctLeft}%` : `${floor.pctLeft}%`;
            }
        });
    }

    if (isMobile) {
        closeDesktopCard();
    } else {
        hideModal();
    }
});

window.onload = init;
</script>
</body>
</html>
