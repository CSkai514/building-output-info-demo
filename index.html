<style>
/* ============================================================
   RESET & BASE
============================================================ */
:root {
    --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    /* Centers the background image perfectly on mobile screens */
    --mobile-center-target: -81%; 
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    /* LIGHT THEME UPGRADE: Changed background to clean white for logo visibility */
    background: #ffffff;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
}

/* ============================================================
   LOADING SCREEN OVERLAY
============================================================ */
#loading-screen {
    position: fixed;
    inset: 0;
    /* LIGHT THEME UPGRADE: White loading background */
    background: #ffffff;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 0.6s ease, visibility 0.6s ease;
}

#loading-screen.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
}

.spinner {
    width: 45px;
    height: 45px;
    /* LIGHT THEME UPGRADE: Dark spinner */
    border: 3px solid rgba(0, 0, 0, 0.1);
    border-top-color: #1a1a1a;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 20px;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

.loading-text {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    /* LIGHT THEME UPGRADE: Dark loading text */
    color: #1a1a1a;
    text-transform: uppercase;
    animation: pulse 1.5s ease-in-out infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
}

/* ============================================================
   FLOATING MAIN LOGO (Moved from Page Header)
============================================================ */
.main-logo {
    position: absolute;
    top: 6%; /* Positions it nicely in the upper sky */
    left: 50%;
    transform: translateX(-50%);
    max-width: 280px;
    width: 40%;
    min-width: 180px;
    height: auto;
    object-fit: contain;
    z-index: 12;
    pointer-events: none; /* Prevents it from interfering with user clicks */
}

/* ============================================================
   SCENE CONTAINER (BACKGROUND IMAGE)
============================================================ */
.scene-wrapper {
    position: relative;
    /* RESPONSIVE UPGRADE: Container scales naturally with the image width */
    width: 95%;
    max-width: 1300px; 
    border-radius: 24px;
    /* LIGHT THEME UPGRADE: Softened shadow so it looks elegant on white */
    box-shadow: 0 30px 60px rgba(0,0,0,0.15);
    overflow: hidden;
    margin: 40px auto; /* Added top margin to space it from top of page */
}

.scene-content {
    position: relative;
    width: 100%;
    /* Prevents inline-block margin gap at the bottom */
    display: flex; 
}

#building-img {
    width: 100%;
    /* RESPONSIVE UPGRADE: Height auto ensures proportional scaling without cropping */
    height: auto;
    display: block;
    filter: brightness(0.85) contrast(1.1);
    z-index: 1;
}

/* ============================================================
   SVG LINE LAYER
============================================================ */
#line-svg {
    position: absolute;
    inset: 0;
    width: 100%; 
    height: 100%;
    pointer-events: none;
    z-index: 8;
    overflow: visible; 
}

.connector-line {
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    filter: drop-shadow(0 0 5px rgba(255,255,255,0.4));
}

/* ============================================================
   ABSOLUTE HOTSPOTS (LOGOS ON BUILDING)
============================================================ */
#hotspots-layer {
    position: absolute;
    inset: 0;
    z-index: 15;
    pointer-events: none; 
}

.hotspot {
    position: absolute;
    transform: translate(-50%, -50%); 
    display: flex;
    align-items: center;
    gap: 15px;
    cursor: pointer;
    pointer-events: auto;
}

.hit-area {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 0;
}

.hover-logo {
    object-fit: contain;
    transition: var(--transition);
    position: relative;
    z-index: 2;
}

.menu-dot {
    width: 14px;
    height: 14px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 0 12px rgba(255,255,255,0.8);
    transform: scale(0);
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    flex-shrink: 0;
    position: relative;
    z-index: 2;
}

.hotspot:hover .hover-logo, .hotspot.active .hover-logo {
    transform: scale(1.15);
    border-color: rgba(255, 255, 255, 0.3);
    filter: drop-shadow(0 8px 15px rgba(0,0,0,0.7));
}

.hotspot:hover .menu-dot, .hotspot.active .menu-dot {
    transform: scale(1);
    opacity: 1;
}

/* ============================================================
   CONTENT CARD
============================================================ */
.content-card {
    position: absolute;
    /* RESPONSIVE UPGRADE: Card automatically shrinks on smaller laptops */
    width: clamp(300px, 32vw, 420px);
    border-radius: 24px;
    padding: clamp(25px, 3vw, 35px) clamp(30px, 3vw, 40px);
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    pointer-events: none;
    opacity: 0;
    visibility: hidden;
    transform: translateX(20px); 
    transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
    /* LIGHT THEME UPGRADE: Softened shadow */
    box-shadow: 0 20px 50px rgba(0,0,0,0.15);
    z-index: 20;
}

.content-card.active {
    opacity: 1;
    visibility: visible;
    transform: translateX(0);
    pointer-events: auto;
}

.content-card, .modal-content {
    color: var(--card-text, #fff);
    border: 1px solid var(--card-border, rgba(255,255,255,0.15));
}
.c-desc {
    color: var(--card-desc, rgba(255,255,255,0.9));
}

.close-btn {
    position: absolute;
    top: 20px; right: 20px;
    width: 32px; height: 32px;
    border-radius: 50%;
    font-size: 14px;
    font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    z-index: 10;
    border: none;
}
.close-btn:hover { transform: scale(1.1); }

.c-logo-container {
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--card-border, rgba(255,255,255,0.2));
    width: 100%;
}

.c-desc {
    line-height: 1.5;
    margin-bottom: 25px;
}

/* ============================================================
   GALLERIES (GRID vs SLIDER)
============================================================ */
.gallery-wrapper {
    width: 100%;
    margin-bottom: 25px;
}

/* 3-Image Grid Style */
.card-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    width: 100%;
}
.card-grid img {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    border-radius: 4px;
    background: rgba(0,0,0,0.2); 
}

/* Slider Style */
.card-slider {
    width: 100%;
    height: 160px;
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    background: rgba(0,0,0,0.1);
    box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
    border: 1px solid var(--card-border, rgba(255,255,255,0.1));
}
.slide {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.8s ease-in-out;
}
.slide.active { opacity: 1; }

.slider-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.4);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
    width: 28px; height: 28px;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    z-index: 5;
    transition: all 0.2s;
}
.slider-btn:hover { background: rgba(0,0,0,0.8); transform: translateY(-50%) scale(1.1); }
.slider-btn.prev { left: 10px; }
.slider-btn.next { right: 10px; }

.slider-pagination {
    position: absolute;
    bottom: 12px;
    left: 0; width: 100%;
    display: flex; justify-content: center; gap: 6px;
    z-index: 5;
}
.slider-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--dot-color, rgba(255,255,255,0.4));
    cursor: pointer;
    transition: all 0.3s;
}
.slider-dot:hover { background: var(--dot-active, rgba(255,255,255,0.8)); }
.slider-dot.active { background: var(--dot-active, #fff); transform: scale(1.3); }

/* ============================================================
   LINKS (UNDERLINE vs PILL BUTTON)
============================================================ */
.c-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    transition: all 0.3s;
}

/* Default Pill Button Style */
.c-link.style-button {
    padding: 14px 32px;
    border-radius: 30px;
    font-weight: 600;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    background: var(--card-btn-bg, #fff);
    color: var(--card-btn-text, #000);
}
.c-link.style-button:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

/* Underlined Text Style */
.c-link.style-underline {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 18px;
    font-weight: 400;
    color: var(--card-text, #fff);
    border-bottom: 1px solid var(--card-text, #fff);
    padding-bottom: 2px;
}
.c-link.style-underline:hover { opacity: 0.7; }

/* ============================================================
   MOBILE MODAL
============================================================ */
.modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7); 
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    transition: all 0.4s ease;
}
.modal-overlay.active { opacity: 1; visibility: visible; }

.modal-content {
    width: 90%;
    max-width: 400px;
    border-radius: 24px;
    padding: 40px 30px 35px;
    text-align: center;
    position: relative;
    transform: translateY(30px) scale(0.95);
    transition: var(--transition);
    /* LIGHT THEME UPGRADE: Softened shadow */
    box-shadow: 0 20px 50px rgba(0,0,0,0.15);
}
.modal-overlay.active .modal-content { transform: translateY(0) scale(1); }

.nav-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    border-radius: 50%;
    width: 36px; height: 36px;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    z-index: 10;
    background: var(--card-border, rgba(0,0,0,0.2));
    border: 1px solid var(--card-border, rgba(255,255,255,0.2));
    color: var(--card-text, #fff);
}
.nav-arrow:hover { background: var(--card-border, rgba(0,0,0,0.4)); }
.nav-arrow.prev { left: 15px; }
.nav-arrow.next { right: 15px; }

/* ============================================================
   RESPONSIVE LOGIC (MOBILE / TABLET PORTRAIT)
============================================================ */
@media (max-width: 900px) {
    .scene-wrapper {
        width: calc(100% - 20px);
        margin: 20px 10px;
        height: 75vh; 
        min-height: 550px;
    }
    #line-svg { display: none !important; }
    .content-card { display: none !important; }

    .scene-content {
        position: absolute;
        width: 280%; 
        height: 100%;
        left: 50%;
        transform: translateX(var(--mobile-center-target));
    }
    
    #building-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
}
</style>
</head>

const container = document.getElementById('hotspots-layer');
const desktopCard = document.getElementById('desktop-card');
const mobileOverlay = document.getElementById('mobile-overlay');
const modalCard = document.getElementById('modal-card');
const path = document.getElementById('connector-path');
const wrapper = document.getElementById('scene-wrapper');

let isMobile = window.innerWidth <= 900;
let activeIndex = -1;
let slideInterval; 
let drawTimeout; 

function init() {
    container.innerHTML = '';
    DATA.forEach((floor, index) => {
        const hs = document.createElement('div');
        hs.className = 'hotspot';
        hs.id = `hotspot-${index}`;
        
        hs.style.top = isMobile && floor.mobilePctTop !== undefined ? `${floor.mobilePctTop}%` : `${floor.pctTop}%`;
        hs.style.left = isMobile && floor.mobilePctLeft !== undefined ? `${floor.mobilePctLeft}%` : `${floor.pctLeft}%`;
        
        const dotHTML = `<div class="menu-dot"></div>`;
        
        hs.innerHTML = `
            <div class="hit-area" style="width: ${floor.hitAreaWidth || '200px'}; height: ${floor.hitAreaHeight || '100px'};"></div>

        `;
        
        hs.addEventListener('mouseenter', () => { if(!isMobile) showDesktop(index); });
        hs.addEventListener('click', () => { if(isMobile) showMobile(index); else showDesktop(index); });
        
        container.appendChild(hs);
    });
}

    card.style.background = data.bgGradient;
    card.style.setProperty('--card-text', data.textColor);
    card.style.setProperty('--card-desc', data.descColor);
    if(data.btnBg) card.style.setProperty('--card-btn-bg', data.btnBg);
    if(data.btnText) card.style.setProperty('--card-btn-text', data.btnText);
    card.style.setProperty('--card-border', data.borderColor);
    card.style.setProperty('--dot-color', data.dotColor || 'rgba(255,255,255,0.4)');
    card.style.setProperty('--dot-active', data.dotActiveColor || '#ffffff');

    const descEl = document.getElementById(prefix + '-desc');
    descEl.style.fontFamily = data.descFont || "'Plus Jakarta Sans', sans-serif";
    descEl.style.fontSize = data.descFontSize || "14px";

    const closeBtn = document.getElementById(prefix + '-close');
    if (closeBtn) {
        closeBtn.style.background = data.closeBtnBg || "rgba(0,0,0,0.1)";
        closeBtn.style.color = data.closeBtnColor || "#ffffff";
    }
}

function renderGallery(prefix, data) {
    clearInterval(slideInterval);
    const galleryWrapper = document.getElementById(prefix + '-gallery');
    
    if (!data.images || data.images.length === 0) {
        galleryWrapper.innerHTML = '';
        return;
    }

    if (data.galleryType === 'grid') {
        let html = `<div class="card-grid">`;
        data.images.slice(0, 3).forEach(img => {
            html += `<img src="${img}" alt="${data.name} Photo" />`;
        });
        html += `</div>`;
        galleryWrapper.innerHTML = html;
        
    } else {
        let html = `<div class="card-slider" id="${prefix}-slider-inner">`;
        html += data.images.map((img, i) => `
            <img src="${img}" class="slide ${i === 0 ? 'active' : ''}" alt="${data.name} Interior" />
        `).join('');
        
        if (data.images.length > 1) {
            html += `
                <button class="slider-btn prev">❮</button>
                <button class="slider-btn next">❯</button>
                <div class="slider-pagination">
                    ${data.images.map((_, i) => `<span class="slider-dot ${i === 0 ? 'active' : ''}"></span>`).join('')}
                </div>
            `;
        }
        html += `</div>`;
        galleryWrapper.innerHTML = html;

        if (data.images.length > 1) {
            const slider = document.getElementById(prefix + '-slider-inner');
            const slides = slider.querySelectorAll('.slide');
            const dots = slider.querySelectorAll('.slider-dot');
            const btnPrev = slider.querySelector('.slider-btn.prev');
            const btnNext = slider.querySelector('.slider-btn.next');
            const numSlides = data.images.length;
            let currentSlide = 0;
            
            function goToSlide(n) {
                slides[currentSlide].classList.remove('active');
                dots[currentSlide].classList.remove('active');
                currentSlide = (n + numSlides) % numSlides;
                slides[currentSlide].classList.add('active');
                dots[currentSlide].classList.add('active');
                resetInterval();
            }
            
            btnPrev.addEventListener('click', (e) => { e.preventDefault(); goToSlide(currentSlide - 1); });
            btnNext.addEventListener('click', (e) => { e.preventDefault(); goToSlide(currentSlide + 1); });
            dots.forEach((dot, i) => dot.addEventListener('click', (e) => { e.preventDefault(); goToSlide(i); }));
            
            function resetInterval() {
                clearInterval(slideInterval);
                slideInterval = setInterval(() => { goToSlide(currentSlide + 1); }, 3000);
            }
            resetInterval();
        }
    }
}

function updateContent(prefix, data) {
    const logoImg = document.getElementById(prefix + '-logo');
    logoImg.src = data.cardLogoSrc || data.logoSrc;
    logoImg.style.width = data.cardLogoWidth || '160px';
    logoImg.style.height = 'auto';
    logoImg.style.maxHeight = 'none';
    
    document.getElementById(prefix + '-desc').innerHTML = data.desc; 
    
    const linkEl = document.getElementById(prefix + '-link');
    linkEl.href = data.link;
    if (data.linkType === 'underline') {
        linkEl.className = 'c-link style-underline';
        linkEl.innerHTML = 'Visit Our Website';
    } else {
        linkEl.className = 'c-link style-button';
        linkEl.innerHTML = 'Visit Our Website <span>↗</span>';
    }

    renderGallery(prefix, data);
}

function drawConnectorLine(hotspotEl, cardElement) {
    const wRect = wrapper.getBoundingClientRect();
    const dot = hotspotEl.querySelector('.menu-dot');
    
    // Safety check just in case dot is missing
    if (!dot) return;
    const dRect = dot.getBoundingClientRect();
    const cRect = cardElement.getBoundingClientRect();
    
    // Point A: Center of the white Hotspot dot (End of the line)
    const endX = dRect.left - wRect.left + (dRect.width / 2);
    const endY = dRect.top - wRect.top + (dRect.height / 2);

    // Point B: Right Edge, Middle Height of the Card (Start of the line)
    const startX = cRect.left - wRect.left + cRect.width;
    const startY = cRect.top - wRect.top + (cRect.height / 2);
    
    // Bezier curve calculations for a smooth S-shape
    const controlOffset = Math.abs(startX - endX) * 0.4;
    const d = `M ${startX} ${startY} C ${startX + controlOffset} ${startY}, ${endX - controlOffset} ${endY}, ${endX} ${endY}`;
    
    path.setAttribute('d', d);

    const length = path.getTotalLength();
    path.style.transition = 'none'; 
    path.style.strokeDasharray = length + ' ' + length;
    path.style.strokeDashoffset = length;
    path.getBoundingClientRect();
    path.style.transition = 'stroke-dashoffset 0.6s cubic-bezier(0.23, 1, 0.32, 1)';
    path.style.strokeDashoffset = '0';
}

function showDesktop(index) {
    if(activeIndex === index) return;
    activeIndex = index;
    const data = DATA[index];
    
    clearTimeout(drawTimeout);
    
    document.querySelectorAll('.hotspot').forEach(m => m.classList.remove('active'));
    const activeHotspot = document.getElementById(`hotspot-${index}`);
    activeHotspot.classList.add('active');
    
    updateContent('d', data);
    applyCardStyles(desktopCard, data, 'd');
    
    // Force layout measurement
    desktopCard.style.display = 'flex';
    
    const wRect = wrapper.getBoundingClientRect();
    const hY = wRect.height * (data.pctTop / 100);

    const cardHeight = desktopCard.offsetHeight || 450;

    // RESPONSIVE LOGIC: The card perfectly floats in the left "empty space" 
    // Increased from 0.08 to 0.18 to move the card closer to the building and shorten the line
    let cardX = wRect.width * 0.18; 

    // Align the middle of the card with the hotspot dot
    let cardY = hY - (cardHeight / 2);

    // BOUNDARY CLAMPING: Prevents the card from ever getting pushed off the top/bottom
    const paddingY = 30;
    if (cardY < paddingY) cardY = paddingY;
    if (cardY + cardHeight > wRect.height - paddingY) {
        cardY = wRect.height - cardHeight - paddingY;
    }

    desktopCard.style.left = `${cardX}px`;
    desktopCard.style.top = `${cardY}px`;
    
    drawTimeout = setTimeout(() => {
        desktopCard.classList.add('active');
        const strokeColor = data.lineColor || (data.textColor === '#1a1a1a' ? 'rgba(0,0,0,0.5)' : 'rgba(255,255,255,0.7)');
        path.setAttribute('stroke', strokeColor);
        drawConnectorLine(activeHotspot, desktopCard);
    }, 20);
}

function closeDesktopCard() {
    if(activeIndex === -1) return;
    
    clearTimeout(drawTimeout); 
    
    desktopCard.classList.remove('active');
    if (path.getTotalLength) {
        const length = path.getTotalLength();
        path.style.transition = 'stroke-dashoffset 0.4s ease-out';
        path.style.strokeDashoffset = length;
    }

    document.querySelectorAll('.hotspot').forEach(m => m.classList.remove('active'));
    clearInterval(slideInterval);
    activeIndex = -1;
}

function showMobile(index) {
    activeIndex = index;
    updateMobileContent();
    mobileOverlay.classList.add('active');
    document.body.style.overflow = 'hidden';
}

function updateMobileContent() {
    if (activeIndex < 0) activeIndex = DATA.length - 1;
    if (activeIndex >= DATA.length) activeIndex = 0;

    const data = DATA[activeIndex];
    updateContent('m', data);
    applyCardStyles(modalCard, data, 'm');
}

function navigateMobile(direction) {
    activeIndex += direction;
    updateMobileContent();
}

function hideModal() {
    mobileOverlay.classList.remove('active');
    document.body.style.overflow = '';
    clearInterval(slideInterval);
}

function closeMobileModal(e) {
    if(e.target === mobileOverlay) hideModal();
}

wrapper.addEventListener('mouseleave', () => {
    if(!isMobile) closeDesktopCard();
});

window.addEventListener('resize', () => {
    const wasMobile = isMobile;
    isMobile = window.innerWidth <= 900;
    
    if (wasMobile !== isMobile) {
        DATA.forEach((floor, index) => {
            const hs = document.getElementById(`hotspot-${index}`);
            if (hs) {
                hs.style.top = isMobile && floor.mobilePctTop !== undefined ? `${floor.mobilePctTop}%` : `${floor.pctTop}%`;
                hs.style.left = isMobile && floor.mobilePctLeft !== undefined ? `${floor.mobilePctLeft}%` : `${floor.pctLeft}%`;
            }
        });
    }

    if (isMobile) {
        closeDesktopCard();
    } else {
        hideModal();
    }
});

// ============================================================
// FULL ASSET PRELOADER (Fixes the "Stuck Logo" cache issue)
// ============================================================
let assetsLoaded = false;
let windowLoaded = false;

function hideLoaderIfReady() {
    if (assetsLoaded && windowLoaded) {
        setTimeout(() => {
            const loader = document.getElementById('loading-screen');
            if (loader) loader.classList.add('hidden');
        }, 300); 
    }
}

const allImagesToPreload = [];
DATA.forEach(d => {
    if (d.logoSrc) allImagesToPreload.push(d.logoSrc);
    if (d.cardLogoSrc) allImagesToPreload.push(d.cardLogoSrc);
    if (d.images) allImagesToPreload.push(...d.images);
});

let loadedImagesCount = 0;
if (allImagesToPreload.length === 0) {
    assetsLoaded = true;
} else {
    allImagesToPreload.forEach(src => {
        const img = new Image();
        img.onload = () => { loadedImagesCount++; if (loadedImagesCount >= allImagesToPreload.length) { assetsLoaded = true; hideLoaderIfReady(); } };
        img.onerror = () => { loadedImagesCount++; if (loadedImagesCount >= allImagesToPreload.length) { assetsLoaded = true; hideLoaderIfReady(); } }; 
        img.src = src;
    });
}

window.addEventListener('load', () => {
    windowLoaded = true;
    hideLoaderIfReady();
});

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
} else {
    init();
}

</script>
