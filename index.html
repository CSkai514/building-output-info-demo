<style>
/* ============================================================
   RESET & BASE
============================================================ */
:root {
    --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: #0a0a0a;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
}

/* ============================================================
   PAGE HEADER
============================================================ */
.page-header {
    width: 100%;
    text-align: center;
    padding: 2.5rem 1rem 1.5rem;
    z-index: 10;
    position: relative;
}
.page-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 4vw, 2.4rem);
    font-weight: 600;
    letter-spacing: -0.01em;
    color: #fff;
}
.page-header p {
    font-size: 11px;
    color: #999;
    margin-bottom: 5px;
    letter-spacing: 2px;
    text-transform: uppercase;
}

/* ============================================================
   SCENE CONTAINER (BACKGROUND IMAGE)
============================================================ */
.scene-wrapper {
    position: relative;
    width: 100%;
    max-width: 1200px; 
    /* Fits the screen precisely */
    height: calc(100vh - 160px); 
    min-height: 600px; 
    border-radius: 24px;
    box-shadow: 0 40px 100px rgba(0,0,0,0.8);
    overflow: hidden;
    margin: 0 20px 40px;
}

#building-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center; 
    filter: brightness(0.85) contrast(1.1);
    z-index: 1;
}

/* ============================================================
   SVG LINE LAYER
============================================================ */
#line-svg {
    position: absolute;
    inset: 0;
    width: 100%; 
    height: 100%;
    pointer-events: none;
    z-index: 8;
    overflow: visible; 
}

.connector-line {
    fill: none;
    stroke-width: 2.5;
    stroke-linecap: round;
    filter: drop-shadow(0 0 5px rgba(255,255,255,0.4));
    /* Transition is handled by JavaScript for the drawing effect */
}

/* ============================================================
   ABSOLUTE HOTSPOTS (LOGOS ON BUILDING)
============================================================ */
#hotspots-layer {
    position: absolute;
    inset: 0;
    z-index: 15;
    pointer-events: none; 
}

.hotspot {
    position: absolute;
    transform: translate(-50%, -50%); 
    display: flex;
    align-items: center;
    gap: 15px;
    cursor: pointer;
    pointer-events: auto;
}

/* Hit Area for larger hover triggering */
.hit-area {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 0;
}

.hover-logo {
    object-fit: contain;
    transition: var(--transition);
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.6));
    position: relative;
    z-index: 2;
}

.menu-dot {
    width: 14px;
    height: 14px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 0 12px rgba(255,255,255,0.8);
    transform: scale(0);
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    flex-shrink: 0;
    position: relative;
    z-index: 2;
}

/* Hover Interaction */
.hotspot:hover .hover-logo, .hotspot.active .hover-logo {
    transform: scale(1.15);
    filter: drop-shadow(0 8px 15px rgba(0,0,0,0.9));
}

.hotspot:hover .menu-dot, .hotspot.active .menu-dot {
    transform: scale(1);
    opacity: 1;
}

/* ============================================================
   CONTENT CARD (Desktop - Absolute Positioned)
============================================================ */
.content-card {
    position: absolute;
    width: 400px;
    border-radius: 24px;
    padding: 35px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    pointer-events: none;
    opacity: 0;
    visibility: hidden;
    /* Card slides in slightly from the side */
    transform: translateX(20px); 
    transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
    box-shadow: 0 40px 80px rgba(0,0,0,0.6);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 20;
}

.content-card.active {
    opacity: 1;
    visibility: visible;
    transform: translateX(0);
    pointer-events: auto;
}

/* Dynamic Card Colors */
.content-card, .modal-content {
    color: var(--card-text, #fff);
    border: 1px solid var(--card-border, rgba(255,255,255,0.15));
}
.c-desc {
    color: var(--card-desc, rgba(255,255,255,0.9));
}
.c-link {
    background: var(--card-btn-bg, #fff);
    color: var(--card-btn-text, #000);
}
.close-btn {
    background: var(--card-border, rgba(0,0,0,0.1));
    color: var(--card-text, #fff);
    border-color: var(--card-border, rgba(255,255,255,0.2));
}
.close-btn:hover { 
    background: var(--card-text, #fff); 
    color: var(--card-btn-bg, #000); 
}

.close-btn {
    position: absolute;
    top: 20px; right: 20px;
    width: 32px; height: 32px;
    border-radius: 50%;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    z-index: 10;
}

.c-logo-container {
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--card-border, rgba(255,255,255,0.2));
    width: 100%;
}

.c-desc {
    font-size: 14px;
    line-height: 1.7;
    margin-bottom: 25px;
    font-weight: 400;
}

/* ============================================================
   SLIDESHOW GALLERY
============================================================ */
.card-slider {
    width: 100%;
    height: 160px;
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 25px;
    background: rgba(0,0,0,0.1);
    box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
    border: 1px solid var(--card-border, rgba(255,255,255,0.1));
}

.slide {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.8s ease-in-out;
}
.slide.active { opacity: 1; }

.slider-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.4);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
    width: 28px; height: 28px;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    z-index: 5;
    transition: all 0.2s;
}
.slider-btn:hover { background: rgba(0,0,0,0.8); transform: translateY(-50%) scale(1.1); }
.slider-btn.prev { left: 10px; }
.slider-btn.next { right: 10px; }

.slider-pagination {
    position: absolute;
    bottom: 12px;
    left: 0; width: 100%;
    display: flex; justify-content: center; gap: 6px;
    z-index: 5;
}
.slider-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    cursor: pointer;
    transition: all 0.3s;
}
.slider-dot:hover { background: rgba(255,255,255,0.8); }
.slider-dot.active { background: #fff; transform: scale(1.3); }

/* ============================================================
   BUTTON
============================================================ */
.c-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 32px;
    border-radius: 30px;
    font-weight: 600;
    font-size: 13px;
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.3s;
}
.c-link:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

/* ============================================================
   MOBILE MODAL
============================================================ */
.modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    transition: all 0.4s ease;
}
.modal-overlay.active { opacity: 1; visibility: visible; }

.modal-content {
    width: 90%;
    max-width: 400px;
    border-radius: 24px;
    padding: 40px 30px 35px;
    text-align: center;
    position: relative;
    transform: translateY(30px) scale(0.95);
    transition: var(--transition);
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}
.modal-overlay.active .modal-content { transform: translateY(0) scale(1); }

.nav-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    border-radius: 50%;
    width: 36px; height: 36px;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    z-index: 10;
    background: var(--card-border, rgba(0,0,0,0.2));
    border: 1px solid var(--card-border, rgba(255,255,255,0.2));
    color: var(--card-text, #fff);
}
.nav-arrow:hover { background: var(--card-border, rgba(0,0,0,0.4)); }
.nav-arrow.prev { left: 15px; }
.nav-arrow.next { right: 15px; }

/* ============================================================
   RESPONSIVE LOGIC
============================================================ */
@media (max-width: 900px) {
    .scene-wrapper {
        margin: 0 10px 20px;
        height: auto; 
        min-height: 600px;
    }
    #line-svg { display: none !important; }
    .content-card { display: none !important; }
}
</style>
</head>

const container = document.getElementById('hotspots-layer');
const desktopCard = document.getElementById('desktop-card');
const mobileOverlay = document.getElementById('mobile-overlay');
const modalCard = document.getElementById('modal-card');
const path = document.getElementById('connector-path');
const wrapper = document.getElementById('scene-wrapper');

let isMobile = window.innerWidth <= 900;
let activeIndex = -1;
let slideInterval; 

/* Initialize Absolute Logos on Building */
function init() {
    container.innerHTML = '';
    DATA.forEach((floor, index) => {
        const hs = document.createElement('div');
        hs.className = 'hotspot';
        hs.id = `hotspot-${index}`;

        hs.innerHTML = `
            <div class="hit-area" style="width: ${floor.hitAreaWidth || '200px'}; height: ${floor.hitAreaHeight || '100px'};"></div>
            ${floor.side === 'left' ? dotHTML : ''}
            <img src="${floor.logoSrc}" class="hover-logo" alt="${floor.name}" onerror="this.style.display='none'" style="width: ${floor.hotspotLogoWidth || '150px'}; height: auto; max-width: none; max-height: none;" />

        `;

        hs.addEventListener('click', () => { if(isMobile) showMobile(index); else showDesktop(index); });
        
        container.appendChild(hs);
    });
}

function applyCardStyles(card, data) {
    card.style.background = data.bgGradient;
    card.style.setProperty('--card-text', data.textColor);
    card.style.setProperty('--card-desc', data.descColor);
    card.style.setProperty('--card-btn-bg', data.btnBg);
    card.style.setProperty('--card-btn-text', data.btnText);
    card.style.setProperty('--card-border', data.borderColor);
}

function startSlideshow(prefix, data) {
    clearInterval(slideInterval);
    const slider = document.getElementById(prefix + '-slider');
    
    if (!data.images || data.images.length === 0) {
        slider.style.display = 'none';
        return;
    }
    
    slider.style.display = 'block';
    const numSlides = data.images.length;
    let currentSlide = 0;

    let html = data.images.map((img, i) => `
        <img src="${img}" class="slide ${i === 0 ? 'active' : ''}" alt="${data.name} Interior" />
    `).join('');
    
    if (numSlides > 1) {
        html += `
            <button class="slider-btn prev">❮</button>
            <button class="slider-btn next">❯</button>
            <div class="slider-pagination">
                ${data.images.map((_, i) => `<span class="slider-dot ${i === 0 ? 'active' : ''}"></span>`).join('')}
            </div>
        `;
    }
    
    slider.innerHTML = html;
    
    if (numSlides > 1) {
        const slides = slider.querySelectorAll('.slide');
        const dots = slider.querySelectorAll('.slider-dot');
        const btnPrev = slider.querySelector('.slider-btn.prev');
        const btnNext = slider.querySelector('.slider-btn.next');
        
        function goToSlide(n) {
            slides[currentSlide].classList.remove('active');
            dots[currentSlide].classList.remove('active');
            
            currentSlide = (n + numSlides) % numSlides;
            
            slides[currentSlide].classList.add('active');
            dots[currentSlide].classList.add('active');
            resetInterval();
        }
        
        btnPrev.addEventListener('click', (e) => { e.preventDefault(); goToSlide(currentSlide - 1); });
        btnNext.addEventListener('click', (e) => { e.preventDefault(); goToSlide(currentSlide + 1); });
        dots.forEach((dot, i) => dot.addEventListener('click', (e) => { e.preventDefault(); goToSlide(i); }));
        
        function resetInterval() {
            clearInterval(slideInterval);
            slideInterval = setInterval(() => {
                goToSlide(currentSlide + 1);
            }, 3000);
        }
        
        resetInterval();
    }
}

function updateContent(prefix, data) {
    const logoImg = document.getElementById(prefix + '-logo');
    logoImg.src = data.logoSrc;
    // Apply precise logo size overrides for the card logo
    logoImg.style.width = data.cardLogoWidth || '160px';
    logoImg.style.height = 'auto';
    logoImg.style.maxHeight = 'none';
    
    document.getElementById(prefix + '-desc').innerHTML = data.desc; 
    document.getElementById(prefix + '-link').href = data.link;
    startSlideshow(prefix, data);
}

function drawConnectorLine(hotspotEl, cardElement, side) {
    const wRect = wrapper.getBoundingClientRect();
    const dot = hotspotEl.querySelector('.menu-dot');
    const dRect = dot.getBoundingClientRect();
    
    // Start precisely from the dot
    const startX = dRect.left - wRect.left + (dRect.width / 2);
    const startY = dRect.top - wRect.top + (dRect.height / 2);
    
    // End at the absolute coordinates calculated for the card
    const targetLeft = parseFloat(cardElement.style.left);
    const targetTop = parseFloat(cardElement.style.top);
    // Force browser to calculate actual height (avoids 0 on first render)
    const cardHeight = cardElement.offsetHeight || 400; 
    const cardWidth = 400; 

    let endX;
    if (side === 'left') {
        endX = targetLeft + cardWidth;
    } else {
        endX = targetLeft;
    }
    const endY = targetTop + (cardHeight / 2);
    
    const controlOffset = Math.abs(startX - endX) * 0.4;
    const d = `M ${startX} ${startY} C ${startX - controlOffset} ${startY}, ${endX + controlOffset} ${endY}, ${endX} ${endY}`;
    
    path.setAttribute('d', d);

    // ==========================================
    // THE DRAWING ANIMATION EFFECT
    // ==========================================
    const length = path.getTotalLength();
    
    // 1. Instantly reset the stroke to be invisible
    path.style.transition = 'none'; 
    path.style.strokeDasharray = length + ' ' + length;
    path.style.strokeDashoffset = length;

    // 2. Force browser to register the reset before animating
    path.getBoundingClientRect();

    // 3. Turn transition back on and draw it to 0
    path.style.transition = 'stroke-dashoffset 0.6s cubic-bezier(0.23, 1, 0.32, 1)';
    path.style.strokeDashoffset = '0';
}

function showDesktop(index) {
    if(activeIndex === index) return;
    activeIndex = index;
    const data = DATA[index];
    
    document.querySelectorAll('.hotspot').forEach(m => m.classList.remove('active'));
    const activeHotspot = document.getElementById(`hotspot-${index}`);
    activeHotspot.classList.add('active');
    
    // 1. Update text and start gallery
    updateContent('d', data);
    applyCardStyles(desktopCard, data);
    
    // 2. Calculate coordinates for card placement
    const wRect = wrapper.getBoundingClientRect();
    const hX = wRect.width * (data.pctLeft / 100);
    const hY = wRect.height * (data.pctTop / 100);

    const cardWidth = 400;
    const gap = 140; // Distance from center logo to card
    let cardX, cardY;

    if (data.side === 'left') {
        cardX = hX - cardWidth - gap;
        // Apply transform direction based on side for smooth slide-in
        desktopCard.style.transform = 'translateX(30px)';
    } else {
        cardX = hX + gap;
        desktopCard.style.transform = 'translateX(-30px)';
    }

    if (data.vAlign === 'up') {
        cardY = hY - 300; 
    } else {
        cardY = hY - 100; 
    }

    // Apply custom manual offsets from the DATA array
    cardX += (data.cardOffsetX || 0);
    cardY += (data.cardOffsetY || 0);

    // Assign placement & open the card
    desktopCard.style.left = `${cardX}px`;
    desktopCard.style.top = `${cardY}px`;
    
    // Small delay ensures display is block before calculating line height
    setTimeout(() => {
        desktopCard.classList.add('active');
        
        // Color the Line dynamically
        path.setAttribute('stroke', data.textColor === '#1a1a1a' ? 'rgba(0,0,0,0.5)' : 'rgba(255,255,255,0.7)');
        
        // Trigger drawing animation
        drawConnectorLine(activeHotspot, desktopCard, data.side);
    }, 10);
}

function closeDesktopCard() {
    if(activeIndex === -1) return;
    
    desktopCard.classList.remove('active');
    
    // Animate line out backwards
    if (path.getTotalLength) {
        const length = path.getTotalLength();
        path.style.transition = 'stroke-dashoffset 0.4s ease-out';
        path.style.strokeDashoffset = length;
    }

    document.querySelectorAll('.hotspot').forEach(m => m.classList.remove('active'));
    clearInterval(slideInterval);
    activeIndex = -1;
}

function showMobile(index) {
    activeIndex = index;
    updateMobileContent();
    mobileOverlay.classList.add('active');
    document.body.style.overflow = 'hidden';
}

function updateMobileContent() {
    if (activeIndex < 0) activeIndex = DATA.length - 1;
    if (activeIndex >= DATA.length) activeIndex = 0;

    const data = DATA[activeIndex];
    updateContent('m', data);
    applyCardStyles(modalCard, data);
}

function navigateMobile(direction) {
    activeIndex += direction;
    updateMobileContent();
}

function hideModal() {
    mobileOverlay.classList.remove('active');
    document.body.style.overflow = '';
    clearInterval(slideInterval);
}

function closeMobileModal(e) {
    if(e.target === mobileOverlay) hideModal();
}

// Close when mouse leaves the scene
wrapper.addEventListener('mouseleave', () => {
    if(!isMobile) closeDesktopCard();
});

window.addEventListener('resize', () => {
    isMobile = window.innerWidth <= 900;
    if (isMobile) {
        closeDesktopCard();
    } else {
        hideModal();
    }
});

window.onload = init;
</script>
</body>
</html>
